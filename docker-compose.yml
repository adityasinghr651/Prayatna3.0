

services:

  # ══════════════════════════════════════════════
  # PostgreSQL + PostGIS
  # ══════════════════════════════════════════════
  postgres:
    image: postgis/postgis:15-3.4
    container_name: urbanrisk_postgres
    restart: always
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       urbanrisk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres -d urbanrisk"]
      interval: 10s
      timeout:  5s
      retries:  10
    networks:
      - urbanrisk_net

  # ══════════════════════════════════════════════
  # Redis
  # ══════════════════════════════════════════════
  redis:
    image: redis:7.2-alpine
    container_name: urbanrisk_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - urbanrisk_net

  # ══════════════════════════════════════════════
  # FastAPI Backend
  # ══════════════════════════════════════════════
  backend:
    build:
      context:    ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: urbanrisk_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - model_data:/app/app/ml
    entrypoint: ["/bin/bash", "/app/../docker/entrypoint.sh"]
    command: >
      uvicorn app.main:socket_app
      --host 0.0.0.0
      --port 8000
      --reload
    environment:
      DATABASE_URL:           postgresql+asyncpg://postgres:password@postgres:5432/urbanrisk
      SYNC_DATABASE_URL:      postgresql://postgres:password@postgres:5432/urbanrisk
      REDIS_URL:              redis://redis:6379/0
      CELERY_BROKER_URL:      redis://redis:6379/0
      CELERY_RESULT_BACKEND:  redis://redis:6379/1
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout:  10s
      retries:  5
    networks:
      - urbanrisk_net

  # ══════════════════════════════════════════════
  # Celery Worker
  # ══════════════════════════════════════════════
  worker:
    build:
      context:    ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: urbanrisk_worker
    restart: always
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=default
    volumes:
      - ./backend:/app
      - model_data:/app/app/ml
    environment:
      DATABASE_URL:           postgresql+asyncpg://postgres:password@postgres:5432/urbanrisk
      SYNC_DATABASE_URL:      postgresql://postgres:password@postgres:5432/urbanrisk
      REDIS_URL:              redis://redis:6379/0
      CELERY_BROKER_URL:      redis://redis:6379/0
      CELERY_RESULT_BACKEND:  redis://redis:6379/1
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - urbanrisk_net

  # ══════════════════════════════════════════════
  # Celery Beat Scheduler
  # ══════════════════════════════════════════════
  beat:
    build:
      context:    ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: urbanrisk_beat
    restart: always
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
    volumes:
      - ./backend:/app
      - beat_data:/app/celerybeat-schedule
    environment:
      DATABASE_URL:           postgresql+asyncpg://postgres:password@postgres:5432/urbanrisk
      SYNC_DATABASE_URL:      postgresql://postgres:password@postgres:5432/urbanrisk
      REDIS_URL:              redis://redis:6379/0
      CELERY_BROKER_URL:      redis://redis:6379/0
      CELERY_RESULT_BACKEND:  redis://redis:6379/1
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - urbanrisk_net

  # ══════════════════════════════════════════════
  # Flower — Celery Monitor UI
  # ══════════════════════════════════════════════
  flower:
    build:
      context:    ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: urbanrisk_flower
    restart: always
    command: >
      celery -A app.workers.celery_app flower
      --port=5555
      --basic_auth=admin:urbanrisk2024
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - worker
    networks:
      - urbanrisk_net

# ══════════════════════════════════════════════
# Volumes
# ══════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  model_data:
    driver: local
  beat_data:
    driver: local

# ══════════════════════════════════════════════
# Networks
# ══════════════════════════════════════════════
networks:
  urbanrisk_net:
    driver: bridge